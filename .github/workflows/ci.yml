name: CI Pipeline

# 1. Triggers: When should this pipeline run?
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Static Code Analysis & Integration Tests
  lint-and-test:
    runs-on: ubuntu-latest
    
    # 1. Definiamo i servizi effimeri necessari al backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          pip install ruff pytest httpx
          pip install -r requirements.txt
        
      - name: Run code check (Ruff)
        run: ruff check .

      # 2. Iniettiamo le credenziali che puntano ai container di test appena creati
      - name: Run Pytest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
        run: pytest test_api.py -v

  # Job 2: Infrastructure Verification & CD (Push to Registry)
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test 
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:latest