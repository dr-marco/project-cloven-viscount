name: CI Pipeline

# 1. Triggers: When should this pipeline run?
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Static Code Analysis
  lint-and.test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          pip install ruff pytest httpx
          pip install -r requirements.txt
        
      - name: Run code check (Ruff)
        run: ruff check .

      - name: Run Pytest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest test_api.py -v

  # Job 2: Infrastructure Verification
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test  # This explicitly tells GitHub to run this ONLY if 'lint' succeeds
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build Docker image
        run: docker build -t cloven_viscount_api:test .