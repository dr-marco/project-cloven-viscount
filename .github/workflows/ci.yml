name: CI Pipeline

# 1. Triggers: When should this pipeline run?
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Static Code Analysis
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run code check
        run: ruff check .

  # Job 2: Infrastructure Verification
  docker-build:
    runs-on: ubuntu-latest
    needs: lint  # This explicitly tells GitHub to run this ONLY if 'lint' succeeds
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build Docker image
        run: docker build -t cloven_viscount_api:test .